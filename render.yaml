services:
  - type: web
    name: event-booking-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: web
    name: event-booking-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://event-booking-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
